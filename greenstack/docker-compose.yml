version: "3.8"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: esg_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Backend/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./Backend/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql

  backend:
    build: ./Backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/esg_db
      JWT_SECRET: your_super_secret_jwt_key_here
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
